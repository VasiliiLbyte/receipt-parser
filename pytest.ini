[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Таймаут на тест (в секундах) - требует pytest-timeout
timeout = 60
# Маркеры для разделения тестов
markers =
    slow: тесты, которые делают реальные API вызовы (отключены по умолчанию)
    unit: быстрые юнит-тесты без внешних зависимостей
# Пропускать slow тесты по умолчанию
addopts = -m "not slow"
